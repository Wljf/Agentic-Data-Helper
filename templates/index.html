<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Data Agent 数据助手</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <!-- marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      body {
        background-color: #f5f5f7;
      }
      .app-container {
        max-width: 960px;
        margin: 40px auto;
      }
      .chat-window {
        height: 520px;
        overflow-y: auto;
        padding: 16px;
        background-color: #ffffff;
        border-radius: 12px;
        border: 1px solid #e5e5e5;
      }
      .message {
        margin-bottom: 16px;
        display: flex;
      }
      .message.user {
        justify-content: flex-end;
      }
      .message.bot {
        justify-content: flex-start;
      }
      .bubble {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.5;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }
      .message.user .bubble {
        background-color: #0d6efd;
        color: #ffffff;
        border-bottom-right-radius: 2px;
      }
      .message.bot .bubble {
        background-color: #f8f9fa;
        border-bottom-left-radius: 2px;
      }
      .scene-badge {
        font-size: 0.8rem;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .scene-badge.validation {
        background-color: #e7f1ff;
        color: #0d6efd;
      }
      .scene-badge.query {
        background-color: #e6f4ea;
        color: #198754;
      }
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        font-size: 1.05rem;
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .markdown-body p {
        margin-bottom: 0.3rem;
      }
      .markdown-body code {
        background-color: #f1f3f5;
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 0.85em;
      }
      .markdown-body pre code {
        display: block;
        padding: 8px 10px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="mb-3">
        <h3 class="mb-1">Data Agent 数据助手</h3>
        <div class="text-muted" style="font-size: 0.9rem">
          结合数据验证与查数找数的本地 Demo，后端基于 Flask + LangChain + SQLite。
        </div>
      </div>

      <!-- 场景切换 -->
      <div
        class="d-flex flex-wrap align-items-center justify-content-between mb-3 border rounded-3 p-3 bg-white"
      >
        <div class="d-flex align-items-center gap-3">
          <strong>选择场景：</strong>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="sceneRadio"
              id="sceneValidation"
              value="validation"
              checked
            />
            <label class="form-check-label" for="sceneValidation">
              数据验证
            </label>
          </div>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="sceneRadio"
              id="sceneQuery"
              value="query"
            />
            <label class="form-check-label" for="sceneQuery">
              查数找数（含 Text-to-SQL / RAG）
            </label>
          </div>
        </div>
        <div class="text-muted" style="font-size: 0.8rem">
          当前场景会在发送消息时一并提交给后端。
        </div>
      </div>

      <!-- 对话窗口 -->
      <div id="chatWindow" class="chat-window mb-3"></div>

      <!-- 输入区域 -->
      <form id="chatForm" class="mt-2">
        <div class="input-group">
          <textarea
            id="userInput"
            class="form-control"
            rows="2"
            placeholder="请输入你的问题，例如：\n- 帮我检查今天和昨天的订单数据质量\n- 查询最近 1 天 GMV 和已支付订单数\n- GMV 的业务口径是怎样的？"
          ></textarea>
          <button
            id="sendBtn"
            class="btn btn-primary"
            type="submit"
            style="min-width: 100px"
          >
            发送
          </button>
        </div>
        <div
          id="statusText"
          class="form-text text-muted mt-1"
          style="font-size: 0.8rem"
        >
          回车发送（多行输入使用 Shift+Enter）。
        </div>
      </form>
    </div>

    <!-- Bootstrap JS (可选，用于部分组件交互) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>

    <script>
      const chatWindow = document.getElementById("chatWindow");
      const chatForm = document.getElementById("chatForm");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");
      const statusText = document.getElementById("statusText");

      function getCurrentScene() {
        const radios = document.querySelectorAll('input[name="sceneRadio"]');
        for (const r of radios) {
          if (r.checked) return r.value;
        }
        return "validation";
      }

      function appendMessage(role, text, scene) {
        const wrapper = document.createElement("div");
        wrapper.className = "message " + role;

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        if (role === "bot") {
          const sceneSpan = document.createElement("span");
          sceneSpan.className =
            "scene-badge " + (scene === "query" ? "query" : "validation");
          sceneSpan.textContent =
            scene === "query" ? "查数找数" : "数据验证";
          bubble.appendChild(sceneSpan);
        }

        const contentDiv = document.createElement("div");
        contentDiv.className = "markdown-body mt-1";
        // 使用 marked.js 将后端返回的 Markdown 转为 HTML
        contentDiv.innerHTML = marked.parse(text || "");

        bubble.appendChild(contentDiv);
        wrapper.appendChild(bubble);
        chatWindow.appendChild(wrapper);

        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function setLoading(loading) {
        if (loading) {
          sendBtn.disabled = true;
          sendBtn.textContent = "发送中...";
          statusText.textContent = "正在向后端请求，请稍候...";
        } else {
          sendBtn.disabled = false;
          sendBtn.textContent = "发送";
          statusText.textContent =
            "回车发送（多行输入使用 Shift+Enter）。";
        }
      }

      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;

        const scene = getCurrentScene();

        appendMessage("user", text, scene);
        userInput.value = "";

        try {
          setLoading(true);
          const resp = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message: text,
              scene: scene,
            }),
          });

          const data = await resp.json();
          if (!resp.ok || data.error) {
            const errMsg =
              data.error || `请求失败，HTTP 状态码：${resp.status}`;
            let fullErr = `**请求出错**：${errMsg}`;
            if (data.detail) {
              if (data.detail.response_status != null)
                fullErr += `\n\n**HTTP 状态**：${data.detail.response_status}`;
              if (data.detail.response_body)
                fullErr += `\n\n**API 响应体**：\n\`\`\`\n${typeof data.detail.response_body === "string" ? data.detail.response_body : JSON.stringify(data.detail.response_body, null, 2)}\n\`\`\``;
              if (data.detail.traceback)
                fullErr += `\n\n**后端 Traceback**：\n\`\`\`\n${data.detail.traceback}\n\`\`\``;
            }
            fullErr += "\n\n请根据上述信息检查后端或 API 配置。";
            appendMessage("bot", fullErr, scene);
          } else {
            appendMessage("bot", data.message || "", scene);
          }
        } catch (err) {
          appendMessage(
            "bot",
            `**网络异常**：${err?.message || err}\n\n请确认后端服务是否已启动（默认 http://127.0.0.1:5000/）。`,
            scene
          );
        } finally {
          setLoading(false);
          userInput.focus();
        }
      });

      // 支持 Enter 发送、Shift+Enter 换行
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          chatForm.dispatchEvent(new Event("submit"));
        }
      });

      // 初始欢迎语
      appendMessage(
        "bot",
        "欢迎使用 **Data Agent 数据助手**。\n\n- 在 **数据验证** 场景下，可以输入：`帮我检查今天和昨天 dwd_trade_order_di 表的主键和数据量是否正常`。\n- 在 **查数找数** 场景下，可以输入：`帮我看一下最近 1 天 GMV 和已支付订单数`，或者 `GMV 的业务口径是怎样的？`。",
        getCurrentScene()
      );
    </script>
  </body>
</html>
